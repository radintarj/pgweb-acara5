<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peta Leaflet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <!-- Library -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Inisialisasi peta (contoh pusat Jakarta)
        var map = L.map("map").setView([-6.1753924, 106.8271528], 10);

        // Basemap
        var basemap = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Layer group toponimi
        let toponimi = L.layerGroup().addTo(map);

        // === Toponimi (Point) ===
        fetch('data/toponimi.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        return L.marker(latlng, {
                            icon: L.icon({
                                iconUrl: "images/home_marker.png",
                                iconSize: [32, 32],
                                iconAnchor: [16, 32],
                                popupAnchor: [0, -32],
                                tooltipAnchor: [10, -20]
                            })
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        var popup_content =
                            "Nama: " + feature.properties.TOPONIMI + "<br>" +
                            "Koordinat: " + feature.geometry.coordinates[1] + ", " +
                            feature.geometry.coordinates[0];

                        layer.bindPopup(popup_content);
                        layer.bindTooltip(feature.properties.TOPONIMI, { direction: "right" });
                    }
                }).addTo(toponimi);
            });

        // === Jalan (Polyline merah) ===
        map.createPane('panejalan');
        map.getPane("panejalan").style.zIndex = 401;
        var jalan = L.geoJSON(null, {

            // Style
            style: function (feature) {
                return { color: "red", weight: 2, opacity: 1 };
            },
            onEachFeature: function (feature, layer) {
                layer.bindTooltip(feature.properties.NAMA_UNSUR, {
                    direction: "auto",
                    sticky: true
                });
            }
        });
        $.getJSON("data/jalan.geojson", function (data) {
            jalan.addData(data).addTo(map);
        });

        // === Sungai (Polyline biru) ===
        var sungai = L.geoJSON(null, {
            style: function (feature) {
                return { color: "blue", weight: 1, opacity: 1 };
            },
            onEachFeature: function (feature, layer) {
                layer.bindTooltip(feature.properties.LAYER, {
                    direction: "auto",
                    sticky: true
                });
            }
        });
        $.getJSON("data/sungai.geojson", function (data) {
            sungai.addData(data).addTo(map);
        });

        // === Batas Kecamatan (Polygon) ===
        map.createPane('panejumlahpenduduk');
        map.getPane("panejumlahpenduduk").style.zIndex = 401;
        var batas_kecamatan = L.geoJSON(null, {
            pane: 'panejumlahpenduduk',

            // Style
            style: function (feature) {
                if (feature.properties.Penduduk <= 15000) {
                    return { color: 'black', weight: 1, fillOpacity: 0.7, fillColor: 'pink' }
                }
                if (feature.properties.Penduduk > 15000 && feature.properties.Penduduk <= 30000) {
                    return { color: 'black', weight: 1, fillOpacity: 0.7, fillColor: 'purple' }
                }
                if (feature.properties.Penduduk > 30000) {
                    return { color: 'black', weight: 1, fillOpacity: 0.7, fillColor: 'brown' }
                }
            },
            onEachFeature: function (feature, layer) {
                var popup_content =
                    "Kecamatan: " + feature.properties.WADMKC + "<br>" +
                    "Jumlah Penduduk: " + feature.properties.Penduduk;
                layer.bindPopup(popup_content);
            }
        });
        $.getJSON("data/batas_kecamatan.geojson", function (data) {
            batas_kecamatan.addData(data).addTo(map);
        });
    </script>
</body>

</html>
